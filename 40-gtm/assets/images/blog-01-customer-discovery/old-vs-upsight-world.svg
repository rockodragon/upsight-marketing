<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bgG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050508"/>
      <stop offset="100%" stop-color="#0a0a10"/>
    </linearGradient>
    <filter id="gl2">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="600" fill="url(#bgG)" rx="16"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="#eeeef2" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700">Before vs. After Customer Intelligence</text>

  <!-- Divider line -->
  <line x1="600" y1="80" x2="600" y2="540" stroke="rgba(238,238,242,0.15)" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- OLD WORLD header -->
  <rect x="40" y="80" width="520" height="44" rx="8" fill="rgba(239,68,68,0.12)" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>
  <text x="300" y="108" text-anchor="middle" fill="#ef4444" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" letter-spacing="1.5">THE OLD WAY</text>

  <!-- UPSIGHT WORLD header -->
  <rect x="640" y="80" width="520" height="44" rx="8" fill="rgba(2,132,199,0.12)" stroke="rgba(2,132,199,0.3)" stroke-width="1"/>
  <text x="900" y="108" text-anchor="middle" fill="#38bdf8" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" letter-spacing="1.5">WITH UPSIGHT</text>

  <!-- Row 1 -->
  <text x="60" y="170" fill="rgba(238,238,242,0.5)" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1">DECISIONS</text>
  <text x="60" y="196" fill="rgba(238,238,242,0.85)" font-family="Inter, system-ui, sans-serif" font-size="16">"I think customers want..."</text>
  <text x="660" y="170" fill="rgba(238,238,242,0.5)" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1">DECISIONS</text>
  <text x="660" y="196" fill="#eeeef2" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600">"Here's exactly what they said."</text>

  <!-- Row 2 -->
  <line x1="60" y1="220" x2="540" y2="220" stroke="rgba(238,238,242,0.08)" stroke-width="1"/>
  <line x1="660" y1="220" x2="1140" y2="220" stroke="rgba(238,238,242,0.08)" stroke-width="1"/>
  <text x="60" y="250" fill="rgba(238,238,242,0.5)" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1">PROCESS</text>
  <text x="60" y="276" fill="rgba(238,238,242,0.85)" font-family="Inter, system-ui, sans-serif" font-size="16">Debate what to build</text>
  <text x="660" y="250" fill="rgba(238,238,242,0.5)" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1">PROCESS</text>
  <text x="660" y="276" fill="#eeeef2" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600">Decide what to build</text>

  <!-- Row 3 -->
  <line x1="60" y1="300" x2="540" y2="300" stroke="rgba(238,238,242,0.08)" stroke-width="1"/>
  <line x1="660" y1="300" x2="1140" y2="300" stroke="rgba(238,238,242,0.08)" stroke-width="1"/>
  <text x="60" y="330" fill="rgba(238,238,242,0.5)" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1">RESEARCH</text>
  <text x="60" y="356" fill="rgba(238,238,242,0.85)" font-family="Inter, system-ui, sans-serif" font-size="16">Research dies in decks</text>
  <text x="660" y="330" fill="rgba(238,238,242,0.5)" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1">RESEARCH</text>
  <text x="660" y="356" fill="#eeeef2" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600">Research drives roadmaps</text>

  <!-- Row 4 -->
  <line x1="60" y1="380" x2="540" y2="380" stroke="rgba(238,238,242,0.08)" stroke-width="1"/>
  <line x1="660" y1="380" x2="1140" y2="380" stroke="rgba(238,238,242,0.08)" stroke-width="1"/>
  <text x="60" y="410" fill="rgba(238,238,242,0.5)" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1">AUTHORITY</text>
  <text x="60" y="436" fill="rgba(238,238,242,0.85)" font-family="Inter, system-ui, sans-serif" font-size="16">Loudest voice wins</text>
  <text x="660" y="410" fill="rgba(238,238,242,0.5)" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1">AUTHORITY</text>
  <text x="660" y="436" fill="#eeeef2" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600">Customer voice wins</text>

  <!-- Row 5 -->
  <line x1="60" y1="460" x2="540" y2="460" stroke="rgba(238,238,242,0.08)" stroke-width="1"/>
  <line x1="660" y1="460" x2="1140" y2="460" stroke="rgba(238,238,242,0.08)" stroke-width="1"/>
  <text x="60" y="490" fill="rgba(238,238,242,0.5)" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1">TOOLS</text>
  <text x="60" y="516" fill="rgba(238,238,242,0.85)" font-family="Inter, system-ui, sans-serif" font-size="16">5 tools, zero integration</text>
  <text x="660" y="490" fill="rgba(238,238,242,0.5)" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1">TOOLS</text>
  <text x="660" y="516" fill="#eeeef2" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600">One platform, complete picture</text>

  <!-- Bottom CTA -->
  <text x="600" y="570" text-anchor="middle" fill="rgba(238,238,242,0.4)" font-family="Inter, system-ui, sans-serif" font-size="13">getupsight.com — Get your customers. Build conviction.</text>
</svg>