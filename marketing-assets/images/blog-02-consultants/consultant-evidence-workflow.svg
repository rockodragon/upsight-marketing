<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050508"/>
      <stop offset="100%" stop-color="#0a0a10"/>
    </linearGradient>
    <filter id="g3">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="480" fill="url(#bg2)" rx="16"/>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" fill="#eeeef2" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700">The Evidence-Based Consulting Workflow</text>
  <text x="600" y="70" text-anchor="middle" fill="rgba(238,238,242,0.5)" font-family="Inter, system-ui, sans-serif" font-size="13">From client question to funded recommendation</text>

  <!-- Phase 1: INTAKE -->
  <rect x="40" y="100" width="240" height="180" rx="12" fill="rgba(2,132,199,0.1)" stroke="#0284c7" stroke-opacity="0.4" stroke-width="1"/>
  <rect x="40" y="100" width="240" height="36" rx="12" fill="#0284c7" fill-opacity="0.2"/>
  <text x="160" y="124" text-anchor="middle" fill="#38bdf8" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" letter-spacing="1">INTAKE</text>
  <text x="160" y="160" text-anchor="middle" fill="#eeeef2" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">Define Evidence Brief</text>
  <text x="160" y="190" text-anchor="middle" fill="rgba(238,238,242,0.6)" font-family="Inter, system-ui, sans-serif" font-size="12">3-5 business questions</text>
  <text x="160" y="210" text-anchor="middle" fill="rgba(238,238,242,0.6)" font-family="Inter, system-ui, sans-serif" font-size="12">the client is stuck on</text>
  <text x="160" y="240" text-anchor="middle" fill="rgba(238,238,242,0.45)" font-family="Inter, system-ui, sans-serif" font-size="11" font-style="italic">"Why are enterprise deals</text>
  <text x="160" y="257" text-anchor="middle" fill="rgba(238,238,242,0.45)" font-family="Inter, system-ui, sans-serif" font-size="11" font-style="italic">stalling after pilot?"</text>

  <!-- Arrow -->
  <polygon points="285,190 305,180 305,200" fill="#38bdf8" opacity="0.6"/>

  <!-- Phase 2: INTERVIEWS -->
  <rect x="310" y="100" width="240" height="180" rx="12" fill="rgba(2,132,199,0.1)" stroke="#0284c7" stroke-opacity="0.4" stroke-width="1"/>
  <rect x="310" y="100" width="240" height="36" rx="12" fill="#0284c7" fill-opacity="0.2"/>
  <text x="430" y="124" text-anchor="middle" fill="#38bdf8" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" letter-spacing="1">INTERVIEWS</text>
  <text x="430" y="160" text-anchor="middle" fill="#eeeef2" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">Capture With Attribution</text>
  <text x="430" y="190" text-anchor="middle" fill="rgba(238,238,242,0.6)" font-family="Inter, system-ui, sans-serif" font-size="12">Who + When + Exact words</text>
  <text x="430" y="210" text-anchor="middle" fill="rgba(238,238,242,0.6)" font-family="Inter, system-ui, sans-serif" font-size="12">Record everything</text>
  <text x="430" y="230" text-anchor="middle" fill="rgba(238,238,242,0.6)" font-family="Inter, system-ui, sans-serif" font-size="12">Tag key moments live</text>
  <text x="430" y="260" text-anchor="middle" fill="rgba(238,238,242,0.45)" font-family="Inter, system-ui, sans-serif" font-size="11" font-style="italic">Role + Company + Context</text>

  <!-- Arrow -->
  <polygon points="555,190 575,180 575,200" fill="#38bdf8" opacity="0.6"/>

  <!-- Phase 3: SYNTHESIS (highlighted) -->
  <rect x="580" y="100" width="240" height="180" rx="12" fill="rgba(245,158,11,0.1)" stroke="#f59e0b" stroke-opacity="0.5" stroke-width="1.5"/>
  <rect x="580" y="100" width="240" height="36" rx="12" fill="#f59e0b" fill-opacity="0.2"/>
  <text x="700" y="124" text-anchor="middle" fill="#f59e0b" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" letter-spacing="1">SYNTHESIS</text>
  <text x="700" y="160" text-anchor="middle" fill="#eeeef2" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">Quotes → Patterns</text>
  <text x="700" y="190" text-anchor="middle" fill="rgba(238,238,242,0.6)" font-family="Inter, system-ui, sans-serif" font-size="12">Extract + tag evidence</text>
  <text x="700" y="210" text-anchor="middle" fill="rgba(238,238,242,0.6)" font-family="Inter, system-ui, sans-serif" font-size="12">Find convergence (3+ agree)</text>
  <text x="700" y="230" text-anchor="middle" fill="rgba(238,238,242,0.6)" font-family="Inter, system-ui, sans-serif" font-size="12">Quantify: "6 of 8 said..."</text>
  <text x="700" y="260" text-anchor="middle" fill="#f59e0b" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">This is where UpSight saves days</text>

  <!-- Arrow -->
  <polygon points="825,190 845,180 845,200" fill="#38bdf8" opacity="0.6"/>

  <!-- Phase 4: DELIVERABLE -->
  <rect x="850" y="100" width="310" height="180" rx="12" fill="rgba(2,132,199,0.1)" stroke="#0284c7" stroke-opacity="0.4" stroke-width="1"/>
  <rect x="850" y="100" width="310" height="36" rx="12" fill="#0284c7" fill-opacity="0.2"/>
  <text x="1005" y="124" text-anchor="middle" fill="#38bdf8" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" letter-spacing="1">DELIVERABLE</text>
  <text x="1005" y="160" text-anchor="middle" fill="#eeeef2" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">Evidence-Backed Output</text>

  <!-- Deliverable items -->
  <circle cx="880" cy="195" r="4" fill="#f59e0b"/>
  <text x="895" y="199" fill="rgba(238,238,242,0.7)" font-family="Inter, system-ui, sans-serif" font-size="12">Recommendations with citations</text>
  <circle cx="880" cy="218" r="4" fill="#f59e0b"/>
  <text x="895" y="222" fill="rgba(238,238,242,0.7)" font-family="Inter, system-ui, sans-serif" font-size="12">SOWs justified by customer evidence</text>
  <circle cx="880" cy="241" r="4" fill="#f59e0b"/>
  <text x="895" y="245" fill="rgba(238,238,242,0.7)" font-family="Inter, system-ui, sans-serif" font-size="12">Priority matrices grounded in data</text>
  <circle cx="880" cy="264" r="4" fill="#f59e0b"/>
  <text x="895" y="268" fill="rgba(238,238,242,0.7)" font-family="Inter, system-ui, sans-serif" font-size="12">Stakeholder alignment from shared evidence</text>

  <!-- Bottom: The key insight -->
  <rect x="150" y="320" width="900" height="100" rx="12" fill="rgba(245,158,11,0.06)" stroke="#f59e0b" stroke-opacity="0.25" stroke-width="1"/>
  <text x="600" y="358" text-anchor="middle" fill="#eeeef2" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600">The Evidence Problem: Why Consultants Need Receipts</text>
  <text x="600" y="385" text-anchor="middle" fill="rgba(238,238,242,0.6)" font-family="Inter, system-ui, sans-serif" font-size="13">PMs have internal credibility. Consultants are outsiders who must prove every finding.</text>
  <text x="600" y="405" text-anchor="middle" fill="rgba(238,238,242,0.6)" font-family="Inter, system-ui, sans-serif" font-size="13">Traceable evidence transfers conviction — the client sees it themselves instead of taking your word.</text>

  <!-- Footer -->
  <text x="600" y="455" text-anchor="middle" fill="rgba(238,238,242,0.4)" font-family="Inter, system-ui, sans-serif" font-size="13">upsight.ai — Turn your next discovery engagement into evidence your client can act on.</text>
</svg>