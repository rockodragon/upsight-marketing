<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="ogBg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050508"/>
      <stop offset="100%" stop-color="#0a0a10"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#ogBg2)"/>

  <!-- Top accent -->
  <rect x="0" y="0" width="1200" height="4" fill="#f59e0b"/>

  <!-- Category -->
  <rect x="80" y="120" width="200" height="30" rx="15" fill="rgba(245,158,11,0.12)" stroke="#f59e0b" stroke-opacity="0.4" stroke-width="1"/>
  <text x="180" y="140" text-anchor="middle" fill="#f59e0b" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" letter-spacing="1">FOR CONSULTANTS</text>

  <!-- Title -->
  <text x="80" y="210" fill="#eeeef2" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800">Customer Discovery</text>
  <text x="80" y="270" fill="#eeeef2" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800">for Consultants</text>

  <!-- Subtitle -->
  <text x="80" y="325" fill="rgba(238,238,242,0.6)" font-family="Inter, system-ui, sans-serif" font-size="22">The evidence-based approach that wins follow-on work.</text>

  <!-- Pain quote -->
  <rect x="80" y="365" width="700" height="60" rx="8" fill="rgba(245,158,11,0.06)" stroke="#f59e0b" stroke-opacity="0.2" stroke-width="1"/>
  <text x="100" y="393" fill="rgba(238,238,242,0.5)" font-family="Inter, system-ui, sans-serif" font-size="16" font-style="italic">"I talked to 15 stakeholders and can't prove what I learned."</text>
  <text x="100" y="414" fill="rgba(238,238,242,0.35)" font-family="Inter, system-ui, sans-serif" font-size="13">— Every consultant, at some point</text>

  <!-- Bottom bar -->
  <rect x="0" y="500" width="1200" height="130" fill="rgba(245,158,11,0.04)"/>
  <line x1="0" y1="500" x2="1200" y2="500" stroke="rgba(245,158,11,0.15)" stroke-width="1"/>

  <!-- Logo -->
  <circle cx="120" cy="565" r="24" fill="#0284c7" fill-opacity="0.3" stroke="#0284c7" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="120" y="572" text-anchor="middle" fill="#38bdf8" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800">U</text>
  <text x="160" y="560" fill="#eeeef2" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700">UpSight</text>
  <text x="160" y="582" fill="rgba(238,238,242,0.5)" font-family="Inter, system-ui, sans-serif" font-size="13">Get your customers. Build conviction.</text>

  <text x="1120" y="572" text-anchor="end" fill="rgba(238,238,242,0.4)" font-family="Inter, system-ui, sans-serif" font-size="15">upsight.ai/blog</text>
