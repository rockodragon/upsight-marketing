<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="ogBg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050508"/>
      <stop offset="100%" stop-color="#0a0a10"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#ogBg3)"/>

  <!-- Top accent (split) -->
  <rect x="0" y="0" width="600" height="4" fill="#0284c7"/>
  <rect x="600" y="0" width="600" height="4" fill="rgba(238,238,242,0.3)"/>

  <!-- VS badge -->
  <circle cx="600" cy="260" r="40" fill="#050508" stroke="rgba(238,238,242,0.2)" stroke-width="2"/>
  <text x="600" y="270" text-anchor="middle" fill="rgba(238,238,242,0.6)" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700">VS</text>

  <!-- UpSight side -->
  <circle cx="300" cy="180" r="50" fill="rgba(2,132,199,0.15)" stroke="#0284c7" stroke-opacity="0.5" stroke-width="2"/>
  <text x="300" y="175" text-anchor="middle" fill="#38bdf8" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800">U</text>
  <text x="300" y="200" text-anchor="middle" fill="#38bdf8" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">UPSIGHT</text>

  <!-- Dovetail side -->
  <circle cx="900" cy="180" r="50" fill="rgba(238,238,242,0.06)" stroke="rgba(238,238,242,0.2)" stroke-width="2"/>
  <text x="900" y="175" text-anchor="middle" fill="rgba(238,238,242,0.6)" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800">D</text>
  <text x="900" y="200" text-anchor="middle" fill="rgba(238,238,242,0.5)" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">DOVETAIL</text>

  <!-- Title -->
  <text x="600" y="360" text-anchor="middle" fill="#eeeef2" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800">Why Small Teams Need</text>
  <text x="600" y="410" text-anchor="middle" fill="#eeeef2" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800">a Different Approach</text>

  <!-- Subtitle -->
  <text x="600" y="455" text-anchor="middle" fill="rgba(238,238,242,0.5)" font-family="Inter, system-ui, sans-serif" font-size="18">An honest comparison: research repository vs. customer intelligence platform</text>

  <!-- Bottom bar -->
  <rect x="0" y="520" width="1200" height="110" fill="rgba(2,132,199,0.06)"/>
  <line x1="0" y1="520" x2="1200" y2="520" stroke="rgba(2,132,199,0.2)" stroke-width="1"/>

  <!-- Logo -->
  <circle cx="120" cy="575" r="22" fill="#0284c7" fill-opacity="0.3" stroke="#0284c7" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="120" y="582" text-anchor="middle" fill="#38bdf8" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="800">U</text>
  <text x="156" y="570" fill="#eeeef2" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700">UpSight</text>
  <text x="156" y="590" fill="rgba(238,238,242,0.5)" font-family="Inter, system-ui, sans-serif" font-size="12">Get your customers. Build conviction.</text>

  <text x="1100" y="580" text-anchor="end" fill="rgba(238,238,242,0.4)" font-family="Inter, system-ui, sans-serif" font-size="14">upsight.ai/compare/dovetail</text>
</svg>