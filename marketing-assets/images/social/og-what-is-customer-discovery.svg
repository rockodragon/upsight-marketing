<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="ogBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050508"/>
      <stop offset="100%" stop-color="#0a0a10"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#ogBg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="157" x2="1200" y2="157" stroke="rgba(238,238,242,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(238,238,242,0.04)" stroke-width="1"/>
  <line x1="0" y1="473" x2="1200" y2="473" stroke="rgba(238,238,242,0.04)" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="630" stroke="rgba(238,238,242,0.04)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="rgba(238,238,242,0.04)" stroke-width="1"/>
  <line x1="900" y1="0" x2="900" y2="630" stroke="rgba(238,238,242,0.04)" stroke-width="1"/>

  <!-- Top bar accent -->
  <rect x="0" y="0" width="1200" height="4" fill="#0284c7"/>

  <!-- Category label -->
  <rect x="80" y="120" width="160" height="30" rx="15" fill="rgba(2,132,199,0.15)" stroke="#0284c7" stroke-opacity="0.4" stroke-width="1"/>
  <text x="160" y="140" text-anchor="middle" fill="#38bdf8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" letter-spacing="1">PRACTICAL GUIDE</text>

  <!-- Title -->
  <text x="80" y="210" fill="#eeeef2" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800">What is Customer</text>
  <text x="80" y="275" fill="#eeeef2" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800">Discovery?</text>

  <!-- Subtitle -->
  <text x="80" y="330" fill="rgba(238,238,242,0.6)" font-family="Inter, system-ui, sans-serif" font-size="22">Turn conversations into evidence you can defend.</text>

  <!-- Key points -->
  <circle cx="100" cy="400" r="6" fill="#f59e0b"/>
  <text x="118" y="406" fill="rgba(238,238,242,0.7)" font-family="Inter, system-ui, sans-serif" font-size="18">5-step framework</text>
  <circle cx="370" cy="400" r="6" fill="#f59e0b"/>
  <text x="388" y="406" fill="rgba(238,238,242,0.7)" font-family="Inter, system-ui, sans-serif" font-size="18">Common mistakes</text>
  <circle cx="640" cy="400" r="6" fill="#f59e0b"/>
  <text x="658" y="406" fill="rgba(238,238,242,0.7)" font-family="Inter, system-ui, sans-serif" font-size="18">AI-era tools</text>

  <!-- Bottom bar -->
  <rect x="0" y="500" width="1200" height="130" fill="rgba(2,132,199,0.06)"/>
  <line x1="0" y1="500" x2="1200" y2="500" stroke="rgba(2,132,199,0.2)" stroke-width="1"/>

  <!-- Logo area -->
  <circle cx="120" cy="565" r="24" fill="#0284c7" fill-opacity="0.3" stroke="#0284c7" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="120" y="572" text-anchor="middle" fill="#38bdf8" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800">U</text>
  <text x="160" y="560" fill="#eeeef2" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700">UpSight</text>
  <text x="160" y="582" fill="rgba(238,238,242,0.5)" font-family="Inter, system-ui, sans-serif" font-size="13">Get your customers. Build conviction.</text>

  <!-- URL -->
  <text x="1120" y="572" text-anchor="end" fill="rgba(238,238,242,0.4)" font-family="Inter, system-ui, sans-serif" font-size="15">upsight.ai/blog</text>
</svg>